</head>

<body class="bg-pearl min-h-screen flex flex-col">

<header class="bg-juniper text-white px-6 py-4 flex justify-between">
    <a href="home.html" class="flex items-center gap-2">
        <img src="logo/logo.png" class="h-10">
        <span class="text-xl font-bold">Hikster</span>
    </a>
</header>

<section class="flex-1 flex items-center justify-center px-4 py-10">
<div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8">

<form id="quiz-form" action="recommendation.html" method="get">

<!-- Q1 -->

<div class="question">
<h2 class="text-2xl font-bold mb-6 text-center">Your trekking experience?</h2>

<label class="block mb-3">
<input type="radio" name="experience" value="beginner" class="peer hidden">
<div class="option-card border p-4 rounded-xl cursor-pointer text-center">Beginner</div>
</label>

<label class="block mb-3">
<input type="radio" name="experience" value="intermediate" class="peer hidden">
<div class="option-card border p-4 rounded-xl cursor-pointer text-center">Intermediate</div>
</label>

<label class="block mb-3">
<input type="radio" name="experience" value="advanced" class="peer hidden">
<div class="option-card border p-4 rounded-xl cursor-pointer text-center">Advanced</div>
</label>
</div>

<!-- Q2 -->

<div class="question hidden">
<h2 class="text-2xl font-bold mb-6 text-center">Preferred terrain?</h2>

<label class="block mb-3">
<input type="radio" name="terrain" value="mountain" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Mountains</div>
</label>

<label class="block mb-3">
<input type="radio" name="terrain" value="forest" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Forest</div>
</label>

<label class="block mb-3">
<input type="radio" name="terrain" value="snow" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Snow</div>
</label>
</div>

<!-- Q3 -->

<div class="question hidden">
<h2 class="text-2xl font-bold mb-6 text-center">Difficulty level?</h2>

<label class="block mb-3">
<input type="radio" name="difficulty" value="easy" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Easy</div>
</label>

<label class="block mb-3">
<input type="radio" name="difficulty" value="moderate" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Moderate</div>
</label>

<label class="block mb-3">
<input type="radio" name="difficulty" value="hard" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Hard</div>
</label>
</div>

<!-- Q4 -->

<div class="question hidden text-center">
<h2 class="text-2xl font-bold mb-4">Trip duration (days)</h2>
<input type="range" name="days" min="1" max="14" value="5" class="w-full">
</div>

<!-- Q5 -->

<div class="question hidden">
<h2 class="text-2xl font-bold mb-6 text-center">Altitude comfort?</h2>

<label class="block mb-3">
<input type="radio" name="altitude" value="low" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Below 3000m</div>
</label>

<label class="block mb-3">
<input type="radio" name="altitude" value="medium" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">3000–5000m</div>
</label>

<label class="block mb-3">
<input type="radio" name="altitude" value="high" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">5000m+</div>
</label>
</div>

<!-- Q6 -->

<div class="question hidden">
<h2 class="text-2xl font-bold mb-6 text-center">Who are you traveling with?</h2>

<label class="block mb-3">
<input type="radio" name="group" value="solo" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Solo</div>
</label>

<label class="block mb-3">
<input type="radio" name="group" value="friends" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Friends</div>
</label>

<label class="block mb-3">
<input type="radio" name="group" value="guided" class="peer hidden">
<div class="option-card border p-4 rounded-xl text-center">Guided Group</div>
</label>
</div>

<div class="flex justify-between mt-8">
<button type="button" id="prev" class="px-4 py-2 bg-gray-200 rounded">Back</button>
<button type="button" id="next" class="px-6 py-2 bg-mint rounded">Next</button>
<button type="submit" id="submit" class="hidden px-6 py-2 bg-juniper text-white rounded">Finish</button>
</div>

</form>
</div>
</section>

<script>
const steps = document.querySelectorAll('.question');
let current = 0;

function showStep(index){
steps.forEach((s,i)=>s.classList.toggle('hidden', i!==index));
document.getElementById('prev').style.display = index===0?'none':'inline-block';
document.getElementById('next').style.display = index===steps.length-1?'none':'inline-block';
document.getElementById('submit').style.display = index===steps.length-1?'inline-block':'none';
}
showStep(0);

document.getElementById('next').onclick=()=>{
current++;
showStep(current);
};

document.getElementById('prev').onclick=()=>{
current--;
showStep(current);
};
</script>

</body>
</html>
