<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile • Hikster</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md text-center">

<i class="fas fa-user-circle text-6xl text-mint mb-4"></i>

<h2 class="text-2xl font-bold mb-2" id="user-name">User</h2>
<p class="text-gray-500 mb-6" id="user-email">email</p>

<button onclick="logout()" class="px-6 py-3 bg-red-500 text-white rounded-full font-bold">
Logout
</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("hiksterUser"));

if(!user){
    window.location.href = "index.html";
}

document.getElementById("user-name").innerText = user.name;
document.getElementById("user-email").innerText = user.email;

function logout(){
    localStorage.removeItem("hiksterUser");
    window.location.href = "index.html";
}
</script>

</body>
</html>
