<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hikster · Profile</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="navbar.js" defer></script>

</head>

<body class="bg-gray-100 font-sans">

<!-- NAVBAR -->
<div class="max-w-5xl mx-auto p-6">

<!-- PROFILE -->
<div class="bg-white rounded-xl shadow p-6 flex gap-4 items-center">
    <div class="h-16 w-16 bg-teal-400 rounded-full flex items-center justify-center text-xl font-bold text-white">
        <span id="avatar">U</span>
    </div>
    <div>
        <h2 id="username" class="text-xl font-bold">User</h2>
        <p id="email" class="text-gray-500 text-sm">user@email.com</p>
    </div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
    <div class="bg-white p-4 rounded-xl shadow text-center">
        <p class="text-xl font-bold">34</p>
        <p class="text-sm text-gray-500">Trips</p>
    </div>
    <div class="bg-white p-4 rounded-xl shadow text-center">
        <p class="text-xl font-bold">₹42K</p>
        <p class="text-sm text-gray-500">Spent</p>
    </div>
    <div class="bg-white p-4 rounded-xl shadow text-center">
        <p class="text-xl font-bold">3</p>
        <p class="text-sm text-gray-500">Upcoming</p>
    </div>
    <div class="bg-white p-4 rounded-xl shadow text-center">
        <p class="text-xl font-bold">8</p>
        <p class="text-sm text-gray-500">Countries</p>
    </div>
</div>

<!-- GRID -->
<div class="grid md:grid-cols-2 gap-6 mt-6">

<!-- LEFT -->
<div class="space-y-6">

<!-- WALLET -->
<div class="bg-[#0f373b] text-white p-5 rounded-xl">
    <p class="text-sm opacity-70">Balance</p>
    <h3 class="text-2xl font-bold">₹1,250</h3>

    <div class="flex gap-2 mt-4">
        <button onclick="location.href='wallet.html'" class="bg-white text-black px-3 py-1 rounded">
            Add
        </button>
        <button onclick="location.href='wallet.html'" class="bg-white text-black px-3 py-1 rounded">
            Redeem
        </button>
    </div>
</div>

<!-- PREFERENCES -->
<div class="bg-white p-5 rounded-xl shadow">
    <h3 class="font-bold mb-3">Preferences</h3>

    <div class="flex justify-between py-2">
        <span>Adventure</span>
        <input type="checkbox" checked>
    </div>

    <div class="flex justify-between py-2">
        <span>Hotels</span>
        <input type="checkbox" checked>
    </div>

    <div class="flex justify-between py-2">
        <span>Flights</span>
        <input type="checkbox">
    </div>
</div>

</div>

<!-- RIGHT -->
<div class="space-y-6">

<!-- BOOKINGS -->
<div class="bg-white p-5 rounded-xl shadow">
    <h3 class="font-bold mb-3">Upcoming Trips</h3>

    <div onclick="location.href='booking-details.html'" class="flex justify-between py-2 cursor-pointer hover:text-teal-600">
        <span>Manali Trek</span>
        <span class="font-semibold">₹6,800</span>
    </div>

    <div onclick="location.href='booking-details.html'" class="flex justify-between py-2 cursor-pointer hover:text-teal-600">
        <span>Goa Retreat</span>
        <span class="font-semibold">₹14,200</span>
    </div>
</div>

<!-- ACTIVITY -->
<div class="bg-white p-5 rounded-xl shadow">
    <h3 class="font-bold mb-3">Activity</h3>

    <p class="text-sm text-gray-600 py-1">✔ Booking confirmed</p>
    <p class="text-sm text-gray-600 py-1">⭐ Review added</p>
    <p class="text-sm text-gray-600 py-1">💰 Refund processed</p>
</div>

</div>

</div>

</div>

<!-- SCRIPT -->
<script>

if(!localStorage.getItem("hiksterUser")){
    window.location.href = "index.html";
}

const user = JSON.parse(localStorage.getItem("hiksterUser"));

if(user){
    document.getElementById("username").innerText = user.name || "User";
    document.getElementById("email").innerText = user.email || "user@email.com";
    document.getElementById("avatar").innerText = user.name ? user.name.charAt(0).toUpperCase() : "U";
}

function logout(){
    localStorage.removeItem("hiksterUser");
    window.location.href = "index.html";
}

</script>

</body>
</html>
