<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>History • Hikster</title>

	<link rel="icon" href="logo/logo.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<script src="https://cdn.tailwindcss.com"></script>

	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					colors: {
						mint: '#2dd4bf',
						teal: '#14b8a6',
						juniper: '#0f373b',
						pearl: '#f8f9fa'
					}
				}
			}
		}
	</script>

	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

		body {
			font-family: 'Inter', system-ui, sans-serif;
			background:
				radial-gradient(circle at 16% 18%, rgba(45, 212, 191, 0.16), transparent 30%),
				radial-gradient(circle at 84% 75%, rgba(20, 184, 166, 0.14), transparent 30%),
				#f8f9fa;
		}

		html.dark body {
			background:
				radial-gradient(circle at 20% 20%, rgba(45, 212, 191, 0.08), transparent 35%),
				radial-gradient(circle at 83% 78%, rgba(13, 95, 102, 0.2), transparent 35%),
				#0b1117;
		}
	</style>

	<script src="navbar.js" defer></script>
</head>

<body class="min-h-screen flex flex-col text-gray-800 dark:text-gray-100">
<section class="pt-28 pb-12 px-6">
	<div class="max-w-7xl mx-auto">
		<div class="rounded-3xl border border-white/60 dark:border-mint/20 shadow-2xl overflow-hidden">
			<div class="bg-gradient-to-r from-juniper via-teal to-juniper px-8 py-11 md:px-12 text-white">
				<p class="uppercase tracking-[0.2em] text-xs text-mint font-bold">Journey Timeline</p>
				<h1 class="text-4xl md:text-5xl font-extrabold mt-3">Trek History</h1>
				<p class="text-teal-100 mt-4 max-w-2xl">Review your earlier recommendations, compare preference snapshots, and pick up where you left off.</p>
			</div>
		</div>
	</div>
</section>

<section class="px-6 pb-16 flex-1">
	<div id="history-container" class="max-w-6xl mx-auto space-y-8"></div>

	<div id="history-actions" class="text-center mt-10 hidden">
		<button onclick="clearHistory()" class="px-7 py-3 bg-red-500 text-white rounded-full font-bold hover:bg-red-600 transition-colors shadow-lg">
			Clear History
		</button>
	</div>
</section>

<footer class="bg-juniper text-center py-7 text-gray-300 border-t border-teal/20">
	© 2026 Hikster
</footer>

<script src="script.js"></script>

<script>
function parseStoredList(key) {
	try {
		const value = localStorage.getItem(key);
		const parsed = window.hkSafeParseJSON ? window.hkSafeParseJSON(value, []) : JSON.parse(value || '[]');
		return Array.isArray(parsed) ? parsed : [];
	} catch {
		return [];
	}
}

function parseHistoryEntries() {
	const primary = parseStoredList("hiksterHistory");
	if (primary.length > 0) return primary;

	// Backward compatibility for older/alternate keys.
	const legacyKeys = ["history", "hikster_history", "hikster-history"];
	for (const key of legacyKeys) {
		const entries = parseStoredList(key);
		if (entries.length > 0) return entries;
	}
	return [];
}

function resolveHistoryResultEntry(entry) {
	if (!entry) return null;
	if (typeof entry === "string") {
		return destinations.find((dest) => dest.id === entry || dest.name === entry) || null;
	}
	if (typeof entry === "object") {
		if (entry.id || entry.name) {
			const byKnown = destinations.find((dest) => dest.id === entry.id || dest.name === entry.name);
			if (byKnown) return byKnown;
		}
		if (entry.trekName) {
			return destinations.find((dest) => dest.name === entry.trekName) || null;
		}
	}
	return null;
}

const history = parseHistoryEntries();
const bookings = parseStoredList("hiksterBookings");
const container = document.getElementById("history-container");
const actions = document.getElementById("history-actions");
const escapeHTML = window.hkEscapeHTML || ((value) => String(value ?? ""));

if (history.length === 0 && bookings.length === 0) {
	container.innerHTML = `
		<div class="text-center py-16 px-8 rounded-2xl bg-white/85 dark:bg-gray-800/85 border border-gray-200 dark:border-gray-700 shadow-lg">
			<div class="h-16 w-16 mx-auto rounded-full bg-mint/20 text-mint flex items-center justify-center text-2xl mb-4">
				<i class="fas fa-clock-rotate-left"></i>
			</div>
			<h2 class="text-3xl font-bold mb-3 text-juniper dark:text-white">No History Found</h2>
			<p class="text-gray-600 dark:text-gray-300 mb-7">Take the quiz and generate your first personalized recommendation set.</p>
			<a href="quiz.html" class="inline-flex items-center gap-2 px-7 py-3 bg-juniper hover:bg-teal text-white rounded-full font-bold transition-colors">
				Take Quiz <i class="fas fa-arrow-right"></i>
			</a>
		</div>
	`;
} else {
	actions.classList.remove("hidden");

	if (bookings.length > 0) {
		const bookingRows = bookings.slice().reverse().map(item => `
			<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 p-4 rounded-xl bg-gray-50 dark:bg-gray-900/60 border border-gray-200 dark:border-gray-700">
				<div>
					<p class="font-semibold text-juniper dark:text-mint">${escapeHTML(item.trekName)}</p>
					<p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(item.region || "Region unavailable")} · ${Number(item.travellers || 0)} traveller${Number(item.travellers) > 1 ? "s" : ""}</p>
				</div>
				<div class="text-left md:text-right">
					<p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(item.date || "Recent")}</p>
					<p class="font-bold text-juniper dark:text-mint">INR ${Number(item.amount || 0).toLocaleString("en-IN")}</p>
					<p class="text-xs text-gray-500 dark:text-gray-400">Ref: ${escapeHTML(item.reference || "HTK-NA")}</p>
				</div>
			</div>
		`).join('');

		container.innerHTML += `
			<article class="bg-white/90 dark:bg-gray-800/90 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl p-6 md:p-7">
				<div class="flex flex-wrap items-center justify-between gap-3 mb-5">
					<p class="text-sm text-gray-500 dark:text-gray-400">Latest checkout activity</p>
					<span class="text-xs uppercase tracking-wider font-semibold text-mint bg-mint/10 px-3 py-1 rounded-full">Bookings</span>
				</div>
				<div class="space-y-3">${bookingRows}</div>
			</article>
		`;
	}

	history.forEach(item => {
		const rawResults = Array.isArray(item.results) ? item.results : [];
		const results = rawResults
			.map(resolveHistoryResultEntry)
			.filter(Boolean);
		let cards = results.length > 0
			? results.map(dest => buildCardHTML(dest)).join('')
			: `<div class="md:col-span-3 p-4 rounded-xl bg-gray-50 dark:bg-gray-900/60 border border-gray-200 dark:border-gray-700 text-sm text-gray-500 dark:text-gray-400">No trek cards available for this snapshot.</div>`;
		const prefs = item.preferences || {};

		container.innerHTML += `
			<article class="bg-white/90 dark:bg-gray-800/90 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl p-6 md:p-7">
				<div class="flex flex-wrap items-center justify-between gap-3 mb-5">
						<p class="text-sm text-gray-500 dark:text-gray-400">${escapeHTML(item.date)}</p>
					<span class="text-xs uppercase tracking-wider font-semibold text-mint bg-mint/10 px-3 py-1 rounded-full">Recommendation Snapshot</span>
				</div>

				<div class="flex flex-wrap gap-2 mb-6">
						<span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.difficulty || 'Any difficulty')}</span>
						<span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.terrain || 'Any terrain')}</span>
						<span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.altitude || 'Any altitude')}</span>
						<span class="px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${escapeHTML(prefs.budget || 'Any budget')}</span>
				</div>

				<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
					${cards}
				</div>
			</article>
		`;
	});
}

function clearHistory() {
	localStorage.removeItem("hiksterHistory");
	localStorage.removeItem("hiksterBookings");
	location.reload();
}
</script>

</body>
</html>
