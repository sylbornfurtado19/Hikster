<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account • Hikster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { mint: '#2dd4bf', juniper: '#0f373b', pearl: '#f8f9fa' } } }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: linear-gradient(rgba(15, 55, 59, 0.8), rgba(15, 55, 59, 0.8)), url('images1/SWISS ALPS.jpg'); 
            background-size: cover; background-position: center; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-3xl shadow-2xl p-8 md:p-10 transition-all">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-juniper dark:text-white">Join Hikster</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Start your adventure today</p>
        </div>

        <form onsubmit="handleSignup(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2">Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-mint outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input type="email" id="signup-email" placeholder="name@example.com" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-mint outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Create Password</label>
                <input type="password" id="signup-pass" placeholder="••••••••" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 dark:bg-gray-800 focus:ring-2 focus:ring-mint outline-none transition-all">
            </div>

            <button type="submit" class="w-full bg-juniper text-white font-bold py-3 rounded-xl hover:bg-opacity-90 transition-all flex items-center justify-center gap-2">
                Create Account <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            Already have an account? <a href="index.html" class="font-bold text-mint hover:underline">Login</a>
        </p>
    </div>

    <script>
        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pass').value;

            if (pass.length < 8) {
                alert("Password must be at least 8 characters!");
                return;
            }

            // Save user data to localStorage
            const newUser = { name: name, email: email };
            localStorage.setItem("hiksterUser", JSON.stringify(newUser));

            // Redirect to home
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
