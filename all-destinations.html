<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trekking Destinations • Hikster</title>

<link rel="icon" href="logo/logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    mint: '#2dd4bf',
                    teal: '#14b8a6',
                    juniper: '#0f373b',
                    pearl: '#f8f9fa',
                }
            }
        }
    }
</script>

<style>
    body { font-family: 'Inter', system-ui, sans-serif; }
</style>

</head>

<body class="bg-pearl dark:bg-gray-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-100 transition-colors duration-300">

<header class="bg-juniper text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <a href="home.html" class="flex items-center gap-2">
        <img src="logo/logo.png" class="h-12">
        <span class="text-2xl font-bold">Hikster</span>
    </a>

    <nav class="hidden md:flex items-center gap-x-6 font-medium">
        <a href="home.html" class="hover:text-mint">Home</a>
        <a href="all-destinations.html" class="text-mint font-bold">Destinations</a>

        <a href="favorites.html" class="hover:text-mint transition-colors flex items-center gap-2">
            <i class="fas fa-heart text-lg"></i>
            <span>Favorites</span>
        </a>

        <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-700">
            <i class="fas fa-moon" id="theme-icon"></i>
        </button>

        <a href="quiz.html" class="px-5 py-2 bg-mint text-juniper rounded-full font-bold">
            Take Quiz
        </a>
    </nav>

</div>

</header>

<section class="bg-white dark:bg-gray-800 py-16 px-6 text-center border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-3xl mx-auto">

    <h1 class="text-4xl md:text-5xl font-extrabold text-juniper dark:text-white mb-4">
        Explore Trekking Destinations
    </h1>

    <p class="text-lg text-gray-600 dark:text-gray-400">
        Discover curated trekking routes across India and the world. Filter by difficulty, terrain, and altitude to find your perfect trek.
    </p>

</div>

</section>

<section class="py-16 px-6 flex-1">
<div class="max-w-7xl mx-auto">

<!-- FILTER BAR -->

<div class="flex flex-wrap items-center justify-between gap-4 mb-10 bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">


<div class="text-sm font-bold text-gray-500 uppercase tracking-wider pl-2">
    21 Trekking Destinations
</div>

<div class="flex gap-2 overflow-x-auto pb-2 md:pb-0">

    <button class="filter-btn px-4 py-2 bg-juniper text-white text-sm font-bold rounded-full" data-filter="all">All</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="easy">Easy</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="moderate">Moderate</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="hard">Hard</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="snow">Snow</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="forest">Forest</button>

    <button class="filter-btn px-4 py-2 bg-gray-100 text-gray-600 hover:bg-mint hover:text-juniper text-sm font-bold rounded-full" data-filter="high">High Altitude</button>

</div>

</div>

<!-- DESTINATION GRID -->

<div id="catalog-container" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>

</div>
</section>

<footer class="bg-juniper text-center py-8 text-gray-400">
    © 2026 Hikster • Explore Beyond Limits
</footer>

<script src="script.js"></script>

<script>
const themeToggle = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');

if(localStorage.getItem('hikster-theme') === 'dark'){
    document.documentElement.classList.add('dark');
    themeIcon.classList.replace('fa-moon','fa-sun');
}

themeToggle.onclick = () => {
    document.documentElement.classList.toggle('dark');
    if(document.documentElement.classList.contains('dark')){
        localStorage.setItem('hikster-theme','dark');
        themeIcon.classList.replace('fa-moon','fa-sun');
    } else {
        localStorage.setItem('hikster-theme','light');
        themeIcon.classList.replace('fa-sun','fa-moon');
    }
};

/* FIXED FILTER LOGIC */
const buttons = document.querySelectorAll('.filter-btn');

buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        // 1. Update Button Styles (Visual Feedback)
        buttons.forEach(b => {
            b.classList.remove('bg-juniper', 'text-white');
            b.classList.add('bg-gray-100', 'text-gray-600');
        });
        btn.classList.remove('bg-gray-100', 'text-gray-600');
        btn.classList.add('bg-juniper', 'text-white');

        // 2. Get the filter value
        const filter = btn.dataset.filter.toLowerCase();
        const cards = document.querySelectorAll('.destination-card');

        // 3. Show/Hide cards
        cards.forEach(card => {
            const cardData = card.getAttribute('data-type').toLowerCase();
            
            if (filter === "all") {
                card.style.display = "flex";
            } else if (cardData.includes(filter)) {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    });
});
</script>

</body>
</html>
