<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Hikster</title>

<link rel="icon" href="logo/logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    mint: '#2dd4bf',
                    juniper: '#0f373b',
                    pearl: '#f8f9fa',
                }
            }
        }
    }
</script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    body { 
        font-family: 'Inter', system-ui, sans-serif; 
        background-image: linear-gradient(rgba(15, 55, 59, 0.8), rgba(15, 55, 59, 0.8)), url('images1/SWISS ALPS.jpg'); 
        background-size: cover; 
        background-position: center; 
    }
</style>

<script src="navbar.js" defer></script>

</head>
<body class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

<div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-10 transform transition-all hover:scale-105 duration-500 border border-gray-100 dark:border-gray-700 relative">

<div class="text-center mb-8 mt-16 relative">
    
    <img src="logo/logo.png" 
         alt="Hikster Logo" 
         class="h-32 object-contain absolute left-1/2 -translate-x-1/2 -top-28">

    <h2 class="text-3xl font-extrabold text-juniper dark:text-white tracking-tight mt-24">
        Welcome Back
    </h2>

    <p class="text-gray-500 dark:text-gray-400 mt-2">
        Sign in to plan your next adventure.
    </p>

</div>

<form onsubmit="handleLogin(event)" class="space-y-6">
    
    <div>
        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input id="login-email" type="email" required class="block w-full pl-11 pr-4 py-3 bg-transparent border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm dark:text-white focus:border-mint dark:focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="explorer@hikster.com">
        </div>
    </div>

    <div>
        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Password</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input id="login-pass" type="password" required class="block w-full pl-11 pr-4 py-3 bg-transparent border-2 border-gray-200 dark:border-gray-600 rounded-xl text-sm dark:text-white focus:border-mint dark:focus:border-mint focus:ring-0 outline-none transition-colors" placeholder="••••••••">
        </div>
    </div>

    <div class="flex items-center justify-between">
        <label class="flex items-center cursor-pointer">
            <input type="checkbox" class="rounded border-gray-300 dark:border-gray-600 dark:bg-gray-700 text-mint focus:ring-mint h-4 w-4 cursor-pointer">
            <span class="ml-2 text-sm text-gray-600 dark:text-gray-400">Remember me</span>
        </label>
        <a href="verify.html" class="text-sm font-bold text-mint hover:text-juniper dark:hover:text-white transition-colors">Forgot password?</a>
    </div>

    <button type="submit" class="w-full py-4 bg-juniper dark:bg-mint hover:bg-gray-800 dark:hover:bg-teal text-white dark:text-juniper font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95 flex justify-center items-center gap-2">
        Sign In <i class="fas fa-sign-in-alt"></i>
    </button>
</form>

<p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-8">
    Don't have an account? <a href="signup.html" class="font-bold text-mint hover:underline">Sign up for free</a>
</p>

</div>

<script>
    function getStoredUsers() {
        return JSON.parse(localStorage.getItem("hiksterUsers")) || [];
    }

    function getPostLoginRedirect() {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");
        return redirect ? decodeURIComponent(redirect) : "home.html";
    }

    function handleLogin(e){
        e.preventDefault();

        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-pass").value;

        const users = getStoredUsers();
        const matchedUser = users.find(user => user.email === email && user.password === password);

        if (!matchedUser) {
            alert("Invalid email or password.");
            return;
        }

        const activeUser = {
            name: matchedUser.name,
            email: matchedUser.email
        };

        localStorage.setItem("hiksterUser", JSON.stringify(activeUser));
        window.location.href = getPostLoginRedirect();
    }
</script>
</body>
</html>
