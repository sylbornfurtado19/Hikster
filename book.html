<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Trek • Hikster</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="navbar.js" defer></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-lg">

<h2 class="text-2xl font-bold mb-6 text-center">Book Your Trek</h2>

<form id="booking-form" class="space-y-5">

<!-- TREK SELECT / PREFILL -->

<div id="trek-container">

<select id="trek-select" class="w-full p-3 border rounded">
<option value="">Select Trek</option>
</select>

<input id="trek-name" type="text" class="w-full p-3 border rounded hidden">

</div>

<button type="button" id="change-btn"
class="hidden text-sm text-mint font-bold">
Change Trek </button>

<input type="text" placeholder="Full Name" required
class="w-full p-3 border rounded">

<input type="email" placeholder="Email" required
class="w-full p-3 border rounded">

<input type="number" placeholder="Number of People" required
class="w-full p-3 border rounded">

<input type="date" required
class="w-full p-3 border rounded">

<button type="submit"
class="w-full py-3 bg-mint text-juniper font-bold rounded">
Confirm Booking </button>

</form>

<p id="success-msg" class="hidden text-green-600 text-center mt-4">
Booking Successful!
</p>

</div>

<script src="script.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const trekId = params.get("trek");

const select = document.getElementById("trek-select");
const input = document.getElementById("trek-name");
const changeBtn = document.getElementById("change-btn");

//  Populate dropdown
destinations.forEach(dest => {
    const option = document.createElement("option");
    option.value = dest.id;
    option.textContent = dest.name;
    select.appendChild(option);
});

//  DEFAULT STATE (Navbar flow)
input.classList.add("hidden");
select.classList.remove("hidden");
changeBtn.classList.add("hidden");

//  IF COMING FROM DESTINATION PAGE
if(trekId){
    const trek = destinations.find(d => d.id === trekId);

    if(trek){
        input.value = trek.name;

        input.classList.remove("hidden");
        select.classList.add("hidden");
        changeBtn.classList.remove("hidden");
    }
}

//  CHANGE TREK BUTTON (FIXED)
changeBtn.addEventListener("click", () => {

    // reset dropdown
    select.value = "";

    // switch UI
    input.classList.add("hidden");
    select.classList.remove("hidden");
    changeBtn.classList.add("hidden");
});

//  OPTIONAL: when user selects new trek → update input
select.addEventListener("change", () => {
    if(select.value){
        const trek = destinations.find(d => d.id === select.value);

        input.value = trek.name;

        input.classList.remove("hidden");
        select.classList.add("hidden");
        changeBtn.classList.remove("hidden");
    }
});

//  FORM SUBMIT
document.getElementById("booking-form").addEventListener("submit", function(e){
    e.preventDefault();
    document.getElementById("success-msg").classList.remove("hidden");
});
    </script>
</body>
</html>
