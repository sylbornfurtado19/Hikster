<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Trek Matches • Hikster</title>

<link rel="icon" href="logo/logo.png">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: 'class',
theme: {
extend: {
colors: {
mint:'#2dd4bf',
teal:'#14b8a6',
juniper:'#0f373b',
pearl:'#f8f9fa'
}
}
}
}
</script>

<style>
body { font-family:'Inter',sans-serif; }
</style>

</head>

<body class="bg-pearl dark:bg-gray-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-100">

<!-- HEADER -->

<header class="bg-juniper text-white px-6 py-4 flex justify-between">
<a href="home.html" class="flex items-center gap-2">
<img src="logo/logo.png" class="h-10">
<span class="text-xl font-bold">Hikster</span>
</a>

<nav class="flex gap-6 items-center">
<a href="home.html">Home</a>
<a href="all-destinations.html">Destinations</a>
<a href="quiz.html" class="bg-mint px-4 py-2 rounded-full text-juniper font-bold">Retake Quiz</a>
</nav>
</header>

<!-- HERO -->

<section class="bg-white dark:bg-gray-800 py-16 px-6 text-center border-b">
<div class="max-w-3xl mx-auto">
<h1 class="text-4xl font-extrabold text-juniper dark:text-white mb-4">
Your Perfect Trek Matches
</h1>
<p class="text-gray-500 dark:text-gray-400">
Based on your trekking preferences, here are your top 3 recommendations.
</p>
</div>
</section>

<!-- RESULTS -->

<section class="py-16 px-6 flex-1">
<div class="max-w-7xl mx-auto">

<div id="results-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">

<!-- LOADING -->

<div class="col-span-3 text-center py-20 text-gray-500">
<i class="fas fa-circle-notch fa-spin text-4xl text-mint mb-4"></i>
<p class="text-xl font-bold">Analyzing your trekking profile...</p>
</div>

</div>

<div class="mt-16 text-center">
<a href="all-destinations.html"
class="px-8 py-4 border-2 border-juniper text-juniper hover:bg-juniper hover:text-white font-bold rounded-xl">
Explore All Treks
</a>
</div>

</div>
</section>

<footer class="bg-juniper text-center py-6 text-gray-400">
© 2026 Hikster
</footer>

<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

const params = new URLSearchParams(window.location.search);

const userPrefs = {
experience: params.get('experience'),
terrain: params.get('terrain'),
difficulty: params.get('difficulty'),
days: params.get('days'),
altitude: params.get('altitude'),
group: params.get('group'),
budget: params.get('budget')
};

const container = document.getElementById('results-container');

// 🔥 FIXED VALIDATION
if (!userPrefs.experience || !userPrefs.terrain) {
container.innerHTML = `
<div class="col-span-3 text-center py-20">
<h2 class="text-3xl font-bold mb-4">No Quiz Data Found</h2>
<a href="quiz.html" class="px-6 py-3 bg-mint rounded-full font-bold">
Take Quiz Again
</a>
</div>`;
return;
}

// 🔥 MAIN LOGIC
setTimeout(() => {

const matches = gradeDestinations(userPrefs);

if(matches.length === 0){
container.innerHTML = `
<div class="col-span-3 text-center py-20">
<h2 class="text-3xl font-bold mb-4">No Suitable Treks Found</h2>
<a href="quiz.html" class="px-6 py-3 bg-mint rounded-full font-bold">
Try Again
</a>
</div>`;
return;
}

container.innerHTML = matches.map(dest => buildCardHTML(dest, true)).join('');

}, 600);

});
</script>

</body>
</html>
