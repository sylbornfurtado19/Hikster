<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email • Hikster</title>
    <link rel="icon" href="logo/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    mint: '#2dd4bf',
                    juniper: '#0f373b',
                    pearl: '#f8f9fa',
                }
            }
        }
    }
</script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    body { 
        font-family: 'Inter', system-ui, sans-serif; 
        background-color: #f8f9fa;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
</style>

<script src="navbar.js" defer></script>

</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-10 border border-gray-100">
    
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-mint/10 text-mint rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-juniper tracking-tight">Check your email</h2>
        <p id="verify-email-text" class="text-gray-500 mt-3 text-sm leading-relaxed">We sent a 6-digit verification code to your email address. Enter it below to confirm your account.</p>
    </div>

    <form id="verify-form" class="space-y-8">
        
        <div class="flex justify-between gap-2" id="otp-inputs">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors" autofocus>
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
        </div>

        <button type="submit" class="w-full py-4 bg-juniper hover:bg-gray-800 text-white font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95">
            Verify Account
        </button>
    </form>

    <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">Didn't receive the code?</p>
        <button id="resend-otp" type="button" class="text-mint font-bold hover:text-juniper transition-colors mt-1">Resend OTP</button>
    </div>
    
    <div class="mt-6 text-center">
        <a href="index.html" class="text-sm text-gray-400 hover:text-juniper transition-colors flex items-center justify-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to login
        </a>
    </div>
</div>

<script>
    const AUTH_BASE_URL = 'http://localhost:8081/api/auth';
    const otpInputs = Array.from(document.querySelectorAll('#otp-inputs input'));
    const verifyEmailText = document.getElementById('verify-email-text');
    const verifyForm = document.getElementById('verify-form');
    const resendButton = document.getElementById('resend-otp');

    function safeParseJSON(value, fallback) {
        try {
            return value ? JSON.parse(value) : fallback;
        } catch {
            return fallback;
        }
    }

    function getVerificationEmail() {
        const params = new URLSearchParams(window.location.search);
        const queryEmail = (params.get('email') || '').trim().toLowerCase();
        if (queryEmail) {
            return queryEmail;
        }

        const pending = safeParseJSON(sessionStorage.getItem('hiksterPendingSignup'), null);
        return pending && pending.email ? String(pending.email).toLowerCase() : '';
    }

    function completeSignup(email) {
        const pending = safeParseJSON(sessionStorage.getItem('hiksterPendingSignup'), null);
        if (!pending || String(pending.email || '').toLowerCase() !== email) {
            alert('Signup session missing. Please sign up again.');
            window.location.href = 'signup.html';
            return;
        }

        const users = safeParseJSON(localStorage.getItem('hiksterUsers'), []);
        const exists = users.some(user => String(user.email || '').toLowerCase() === email);
        if (!exists) {
            users.push({
                name: pending.name,
                email: pending.email,
                passwordHash: pending.passwordHash,
                passwordVersion: pending.passwordVersion || 2
            });
            localStorage.setItem('hiksterUsers', JSON.stringify(users));
        }

        localStorage.setItem('hiksterUser', JSON.stringify({
            name: pending.name,
            email: pending.email
        }));
        sessionStorage.removeItem('hiksterPendingSignup');
        window.location.href = 'home.html';
    }

    const verificationEmail = getVerificationEmail();
    if (!verificationEmail) {
        alert('No pending signup found. Please create account first.');
        window.location.href = 'signup.html';
    } else {
        verifyEmailText.textContent = `We sent a 6-digit verification code to ${verificationEmail}. Enter it below to confirm your account.`;
    }

    otpInputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            input.value = input.value.replace(/\D/g, '').slice(0, 1);
            if (input.value && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (event) => {
            if (event.key === 'Backspace' && !input.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });
    });

    otpInputs[0].addEventListener('paste', (event) => {
        const digits = (event.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, otpInputs.length);
        if (!digits) return;

        event.preventDefault();
        digits.split('').forEach((digit, index) => {
            otpInputs[index].value = digit;
        });

        const focusIndex = Math.min(digits.length, otpInputs.length - 1);
        otpInputs[focusIndex].focus();
    });

    verifyForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const otp = otpInputs.map(input => input.value).join('');

        if (!/^\d{6}$/.test(otp)) {
            alert('Please enter a valid 6-digit code.');
            return;
        }

        try {
            const response = await fetch(`${AUTH_BASE_URL}/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: verificationEmail, otp })
            });
            const result = await response.json();

            if (!response.ok || !result.ok) {
                alert(result.message || 'Verification failed.');
                return;
            }

            completeSignup(verificationEmail);
        } catch {
            alert('Could not connect to Java verification service. Start backend-java first.');
        }
    });

    resendButton.addEventListener('click', async () => {
        if (!verificationEmail) {
            return;
        }
        try {
            const response = await fetch(`${AUTH_BASE_URL}/resend-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: verificationEmail })
            });
            const result = await response.json();
            alert(result.message || (response.ok ? 'OTP resent.' : 'Could not resend OTP.'));
        } catch {
            alert('Could not connect to Java verification service. Start backend-java first.');
        }
    });
</script>

</body>
</html>
