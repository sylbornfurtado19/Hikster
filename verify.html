<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email • Hikster</title>
    <link rel="icon" href="logo/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    mint: '#2dd4bf',
                    juniper: '#0f373b',
                    pearl: '#f8f9fa',
                }
            }
        }
    }
</script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    body { 
        font-family: 'Inter', system-ui, sans-serif; 
        background-color: #f8f9fa;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
</style>

<script src="navbar.js" defer></script>

</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-10 border border-gray-100">
    
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-mint/10 text-mint rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-juniper tracking-tight">Check your email</h2>
        <p class="text-gray-500 mt-3 text-sm leading-relaxed">We sent a 6-digit verification code to your email address. Enter it below to confirm your account.</p>
    </div>

    <form action="home.html" method="get" class="space-y-8">
        
        <div class="flex justify-between gap-2" id="otp-inputs">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors" autofocus>
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
            <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" class="w-12 h-14 text-center text-2xl font-extrabold text-juniper border-2 border-gray-200 rounded-xl focus:border-mint focus:ring-0 outline-none transition-colors">
        </div>

        <button type="submit" class="w-full py-4 bg-juniper hover:bg-gray-800 text-white font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95">
            Verify Account
        </button>
    </form>

    <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">Didn't receive the code?</p>
        <button class="text-mint font-bold hover:text-juniper transition-colors mt-1">Resend OTP</button>
    </div>
    
    <div class="mt-6 text-center">
        <a href="index.html" class="text-sm text-gray-400 hover:text-juniper transition-colors flex items-center justify-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to login
        </a>
    </div>
</div>

<script>
    const otpInputs = Array.from(document.querySelectorAll('#otp-inputs input'));

    otpInputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            input.value = input.value.replace(/\D/g, '').slice(0, 1);
            if (input.value && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (event) => {
            if (event.key === 'Backspace' && !input.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });
    });

    otpInputs[0].addEventListener('paste', (event) => {
        const digits = (event.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, otpInputs.length);
        if (!digits) return;

        event.preventDefault();
        digits.split('').forEach((digit, index) => {
            otpInputs[index].value = digit;
        });

        const focusIndex = Math.min(digits.length, otpInputs.length - 1);
        otpInputs[focusIndex].focus();
    });
</script>

</body>
</html>
