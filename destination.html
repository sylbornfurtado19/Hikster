<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trek Details • Hikster</title>

<link rel="icon" href="logo/logo.png" type="image/png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    mint: '#2dd4bf',
                    teal: '#14b8a6',
                    juniper: '#0f373b',
                    pearl: '#f8f9fa',
                }
            }
        }
    }
</script>

<style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    html { scroll-behavior: smooth; }
</style>

</head>

<body class="bg-pearl dark:bg-gray-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-100">

<header class="bg-juniper text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="home.html" class="flex items-center gap-2">
            <img src="logo/logo.png" class="h-12">
            <span class="text-2xl font-bold">Hikster</span>
        </a>

    <nav class="flex gap-6 items-center">
        <a href="home.html" class="hover:text-mint">Home</a>
        <a href="all-destinations.html" class="hover:text-mint">Destinations</a>
        <a href="quiz.html" class="bg-mint px-5 py-2 rounded-full text-juniper font-bold">Take Quiz</a>
    </nav>
</div>

</header>

<main id="destination-content" class="flex-1 flex flex-col">

<div class="flex-1 flex items-center justify-center py-32 text-gray-500">
    <i class="fas fa-circle-notch fa-spin text-5xl text-mint mb-6"></i>
    <h2 class="text-3xl font-bold">Loading Trek Profile...</h2>
</div>

</main>

<footer class="bg-juniper text-center py-8 text-gray-400">
    © 2026 Hikster • Explore Beyond Limits
</footer>

<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const params = new URLSearchParams(window.location.search);
    const destId = params.get('id');
    const contentDiv = document.getElementById('destination-content');

    const destination = destinations.find(d => d.name === destId);

    if(destination){

    // Build season strip separately to avoid nested template literal issues
    const months = Object.entries(destination.season || {});
    const seasonHTML = months.length ? `
        <section class="mt-10">
            <h2 class="text-3xl font-bold text-juniper dark:text-mint mb-6">Best Time to Visit</h2>
            <div class="grid grid-cols-4 md:grid-cols-12 gap-2">
                ${months.map(([month, type]) => {
                    const styles = {
                        peak:    'bg-emerald-100 text-emerald-800 border border-emerald-200',
                        avoid:   'bg-gray-100 text-gray-400 dark:bg-gray-700 dark:text-gray-500',
                        monsoon: 'bg-blue-100 text-blue-800 border border-blue-200'
                    };
                    const labels = { peak:'Peak', avoid:'Avoid', monsoon:'Monsoon' };
                    return `<div class="flex flex-col items-center gap-1 rounded-xl py-3 px-1 text-center ${styles[type]}">
                        <span class="text-xs font-bold">${month}</span>
                        <span class="text-[10px] font-medium opacity-80">${labels[type]}</span>
                    </div>`;
                }).join('')}
            </div>
            <div class="flex gap-5 mt-4 text-sm text-gray-500 dark:text-gray-400">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-400 inline-block"></span>Peak</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-400 inline-block"></span>Monsoon</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-gray-300 inline-block"></span>Avoid</span>
            </div>
        </section>
    ` : '';

    contentDiv.innerHTML = `
        <!-- HERO -->
        <div class="relative h-[60vh] min-h-[400px] w-full bg-cover bg-center flex items-end"
            style="background-image: url('${destination.image}');">
            <div class="absolute inset-0 bg-gradient-to-t from-juniper via-juniper/50 to-transparent"></div>
            <div class="relative z-10 max-w-7xl mx-auto px-6 pb-12 w-full">
                <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-2">${destination.name}</h1>
                <h3 class="text-xl text-mint font-bold uppercase tracking-widest">${destination.terrain} • ${destination.altitude}</h3>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="max-w-7xl mx-auto px-6 py-16 grid lg:grid-cols-3 gap-12">

            <!-- LEFT -->
            <div class="lg:col-span-2 space-y-10">
                <section>
                    <h2 class="text-3xl font-bold text-juniper dark:text-mint mb-4">Trek Overview</h2>
                    <p class="text-lg text-gray-600 dark:text-gray-300 leading-relaxed">${destination.desc}</p>

                    ${seasonHTML}

                    <div class="mt-8 flex flex-wrap gap-4">
                        <button class="px-8 py-4 bg-juniper text-white rounded-xl font-bold hover:bg-gray-800">Book Trek</button>
                        <button onclick="history.back()" class="px-8 py-4 border rounded-xl">Go Back</button>
                    </div>
                </section>
            </div>

            <!-- RIGHT SIDEBAR -->
            <aside>
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl border">
                    <h3 class="text-2xl font-bold mb-6">Trek Details</h3>
                    <div class="space-y-4 text-sm font-semibold">
                        <div class="flex justify-between"><span>Difficulty</span><span class="text-mint">${destination.difficulty}</span></div>
                        <div class="flex justify-between"><span>Terrain</span><span class="text-mint">${destination.terrain}</span></div>
                        <div class="flex justify-between"><span>Altitude</span><span class="text-mint">${destination.altitude}</span></div>
                        <div class="flex justify-between"><span>Duration</span><span class="text-mint">${destination.duration} days</span></div>
                        <div class="flex justify-between"><span>Experience</span><span class="text-mint">${destination.experience}</span></div>
                    </div>
                </div>
            </aside>

        </div>
    `;

} else {
    contentDiv.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center py-32 text-center">
            <h1 class="text-4xl font-bold mb-4">Trek Not Found</h1>
            <a href="all-destinations.html" class="px-8 py-4 bg-mint rounded-full font-bold">Browse Treks</a>
        </div>
    `;
});
</script>

</body>
</html>
