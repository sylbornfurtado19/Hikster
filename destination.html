<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trek Details • Hikster</title>

<link rel="icon" href="logo/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script>
tailwind.config = {
darkMode: 'class',
theme: {
extend: {
colors: {
mint: '#2dd4bf',
teal: '#14b8a6',
juniper: '#0f373b',
pearl: '#f8f9fa'
}
}
}
}
</script>

<style>
body { font-family: 'Inter', system-ui, sans-serif; }
html { scroll-behavior: smooth; }
</style>

</head>

<body class="bg-pearl dark:bg-gray-900 min-h-screen flex flex-col text-gray-800 dark:text-gray-100">

<header class="bg-juniper text-white shadow-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
<a href="home.html" class="flex items-center gap-2">
<img src="logo/logo.png" class="h-12">
<span class="text-2xl font-bold">Hikster</span>
</a>

<nav class="flex gap-6 items-center">
<a href="home.html" class="hover:text-mint">Home</a>
<a href="all-destinations.html" class="hover:text-mint">Destinations</a>
<a href="quiz.html" class="bg-mint px-5 py-2 rounded-full text-juniper font-bold">Take Quiz</a>
</nav>
</div>
</header>

<main id="destination-content" class="flex-1 flex flex-col">

<div class="flex-1 flex items-center justify-center py-32 text-gray-500">
<h2 class="text-3xl font-bold">Loading Trek Profile...</h2>
</div>

</main>

<footer class="bg-juniper text-center py-8 text-gray-400">
© 2026 Hikster • Explore Beyond Limits
</footer>

<script src="script.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

const params = new URLSearchParams(window.location.search);
const destId = params.get('id');
const contentDiv = document.getElementById('destination-content');

const destination = destinations.find(d => 
    d.id === destId || 
    d.name === destId ||
    d.name.toLowerCase().replace(/\s+/g,"-") === destId
);

if(destination){

const months = Object.entries(destination.season || {});
const seasonHTML = months.length ? `
<section class="mt-10">
<h2 class="text-3xl font-bold text-juniper dark:text-mint mb-6">Best Time to Visit</h2>

<div class="grid grid-cols-4 md:grid-cols-12 gap-2">
${months.map(([month, type]) => {
const styles = {
peak:'bg-emerald-100 text-emerald-800',
avoid:'bg-gray-100 text-gray-400',
monsoon:'bg-blue-100 text-blue-800'
};
return `<div class="rounded-xl py-3 text-center ${styles[type]}">
<span class="text-xs font-bold">${month}</span>
</div>`;
}).join('')}
</div>
</section>` : '';

contentDiv.innerHTML = `

<!-- HERO -->
<div class="relative h-[60vh] bg-cover bg-center flex items-end"
style="background-image: url('${destination.image}')">

<div class="absolute inset-0 bg-gradient-to-t from-juniper"></div>

<div class="relative z-10 px-6 pb-12">
<h1 class="text-5xl font-bold text-white">${destination.name}</h1>
<p class="text-mint mt-2">${destination.location}</p>
</div>
</div>

<!-- CONTENT -->
<div class="max-w-7xl mx-auto px-6 py-16 grid lg:grid-cols-3 gap-12">

<div class="lg:col-span-2 space-y-10">

<section>
<h2 class="text-3xl font-bold mb-4">Overview</h2>
<p>${destination.desc}</p>
</section>

${seasonHTML}

<section>
<h2 class="text-3xl font-bold mb-4">Highlights</h2>
<ul class="list-disc pl-6 space-y-2">
<li>Ideal for ${destination.experience} trekkers</li>
<li>Beautiful ${destination.terrain} landscapes</li>
<li>Best visited in ${destination.bestTime}</li>
<li>Located in ${destination.location}</li>
</ul>
</section>

<div class="mt-8 flex gap-4">
<button class="px-6 py-3 bg-juniper text-white rounded">Book Trek</button>
<a href="all-destinations.html" class="px-6 py-3 border rounded">Go Back</a>
</div>

</div>

<!-- SIDEBAR -->
<aside>
<div class="bg-white dark:bg-gray-800 p-6 rounded shadow">

<h3 class="text-xl font-bold mb-4">Details</h3>

<div class="space-y-3 text-sm">

<p>Difficulty: <b>${destination.difficulty}</b></p>
<p>Duration: <b>${destination.duration} days</b></p>
<p>Altitude: <b>${destination.altitude}</b></p>
<p>Experience: <b>${destination.experience}</b></p>

<p>Start Point: <b>${destination.startPoint || "N/A"}</b></p>
<p>Best Time: <b>${destination.bestTime || "N/A"}</b></p>
<p>Cost: <b>${destination.cost || "N/A"}</b></p>

</div>

</div>
</aside>

</div>
`;

}else{
contentDiv.innerHTML = "<h1>Not Found</h1>";
}

});
</script>

</body>
</html>
