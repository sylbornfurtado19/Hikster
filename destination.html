```
<header class="bg-juniper text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="home.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
            <img src="logo/logo.png" alt="Hikster Logo" style="height: 60px; margin-right: 5px; object-fit: contain;">
            <div class="text-3xl font-bold tracking-tight">Hikster</div>
        </a>
        <nav class="hidden md:flex items-center gap-x-6 font-medium">
            <a href="home.html" class="hover:text-mint transition-colors">Home</a>
            <a href="all-destinations.html" class="hover:text-mint transition-colors">Destinations</a>
            
            <a href="#" class="hover:text-mint transition-colors flex items-center gap-2">
                <i class="fas fa-history text-lg"></i>
                <span>History</span>
            </a>

            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-700 transition-colors">
                <i class="fas fa-moon text-xl" id="theme-icon"></i>
            </button>

            <a href="quiz.html" class="px-6 py-2.5 bg-mint hover:bg-teal text-juniper rounded-full font-bold transition-all shadow-lg">
                Take Quiz
            </a>
        </nav>
    </div>
</header>

<main id="destination-content" class="flex-1 flex flex-col">
    <div class="flex-1 flex flex-col items-center justify-center py-32 text-gray-500">
        <i class="fas fa-circle-notch fa-spin text-5xl text-mint mb-6"></i>
        <h2 class="text-3xl font-bold text-juniper dark:text-white">Loading Destination Profile...</h2>
    </div>
</main>

<footer class="bg-juniper text-center py-8 border-t border-teal/20 mt-auto">
    <p class="text-gray-400 text-sm">&copy; 2026 Hikster • Fueling wanderlust for dreamers and explorers worldwide.</p>
</footer>

<script src="script.js"></script>

<script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    if (localStorage.getItem('hikster-theme') === 'dark') {
        document.documentElement.classList.add('dark');
        if (themeIcon) {
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }
    }

    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('hikster-theme', 'dark');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                localStorage.setItem('hikster-theme', 'light');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const destId = params.get('id');
        const contentDiv = document.getElementById('destination-content');
        
        const destination = destinations.find(d => d.name === destId);

        if (destination) {
            const nameParts = destination.name.split(',');
            const city = nameParts[0];
            const country = nameParts[1] ? nameParts[1].trim() : '';
            const capitalize = (str) => str.charAt(0).toUpperCase() + str.slice(1);
            const generateTags = (arr) => arr.map(item => `<span class="px-4 py-2 bg-mint/10 border border-mint/20 text-mint text-sm font-bold rounded-full capitalize shadow-sm">${item}</span>`).join('');

            contentDiv.innerHTML = `
                <div class="relative h-[60vh] min-h-[400px] w-full bg-cover bg-center flex items-end" style="background-image: url('${destination.image}');">
                    <div class="absolute inset-0 bg-gradient-to-t from-juniper via-juniper/40 to-transparent"></div>
                    <div class="relative z-10 w-full max-w-7xl mx-auto px-6 pb-12">
                        <h1 class="text-5xl md:text-7xl font-extrabold text-white tracking-tight mb-2">${city}</h1>
                        <h3 class="text-xl md:text-2xl text-mint font-bold uppercase tracking-widest">${destination.region} ${country ? `• ${country}` : ''}</h3>
                    </div>
                </div>

                <div class="max-w-7xl mx-auto px-6 py-16 w-full grid grid-cols-1 lg:grid-cols-3 gap-12">
                    <div class="lg:col-span-2 space-y-12">
                        <section>
                            <h2 class="text-3xl font-bold text-juniper dark:text-mint mb-6">Destination Overview</h2>
                            <p class="text-lg text-gray-700 dark:text-gray-300 leading-relaxed mb-6">
                                ${destination.desc}. This location offers a unique blend of experiences that perfectly capture the essence of ${destination.region}.
                            </p>

                            <div class="mt-8 flex flex-wrap gap-4">
                                <button onclick="alert('Mock booking portal initialized...')" class="px-8 py-4 bg-juniper hover:bg-gray-800 dark:bg-mint dark:hover:bg-teal text-white dark:text-juniper font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                                    <i class="fas fa-calendar-check"></i> Check Availability
                                </button>
                                <button onclick="history.back()" class="px-8 py-4 bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 hover:border-juniper dark:hover:border-mint text-juniper dark:text-white font-bold text-lg rounded-xl shadow-sm transition-colors flex items-center gap-2">
                                    <i class="fas fa-arrow-left"></i> Go Back
                                </button>
                            </div>
                        </section>
                    </div>

                    <aside class="relative">
                        <div class="sticky top-24 bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">
                            <h3 class="text-2xl font-bold text-juniper dark:text-white mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">Hikster Breakdown</h3>
                            
                            <div class="space-y-6">
                                <div>
                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Vibe & Pace</h4>
                                    <div class="flex flex-wrap gap-2">${generateTags(destination.trip)}</div>
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Ideal For</h4>
                                    <div class="flex flex-wrap gap-2">${generateTags(destination.companions)}</div>
                                </div>
                                <div>
                                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Top Activities</h4>
                                    <div class="flex flex-wrap gap-2">${generateTags(destination.activities)}</div>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            `;
        } else {
            contentDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center py-32 px-6 text-center">
                    <h1 class="text-4xl font-bold text-juniper dark:text-white mb-4">Destination Not Found</h1>
                    <a href="all-destinations.html" class="px-8 py-4 bg-mint hover:bg-teal text-juniper font-bold rounded-full shadow-lg">
                        Browse All Destinations
                    </a>
                </div>
            `;
        }
    });
</script>
```

</body>
</html>
